apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: saldos-ingress
  labels:
    app: saldos
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
    - hosts:
        - saldos.example.com
      secretName: saldos-tls
  rules:
    - host: saldos.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: saldos-api
                port:
                  number: 80
